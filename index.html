<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>BASH - Business Analytics Student Hub</title>
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/components.css">
    </head>

    <body>
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="logo-section">
                <h1 class="bash-title">BASH</h1>
            </div>

            <div class="search-section">
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" placeholder="Search..."
                        class="search-input">
                </div>
            </div>

            <div class="top-bar-actions">
                <a href="https://forms.gle/mmjderNyoYmzHhzq6" target="_blank"
                    rel="noopener noreferrer" class="register-btn-top"
                    id="registerTopBtn" title="Register">
                    <i class="fas fa-user-plus"></i>
                    <span>Register</span>
                </a>

                <button class="icon-btn contact-top-btn" id="contactTopBtn"
                    data-page="contact" title="Contact" type="button">
                    <i class="fas fa-address-book"></i>
                </button>

                <!-- Notification Button -->
                <button class="icon-btn notification-btn" title="Notifications"
                    id="notificationBtn" type="button">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge" id="notificationBadge"
                        style="display:none;">0</span>
                </button>

                <!-- Tasks (hidden from UI; modal logic kept in main.js) -->
                <button class="icon-btn fab-tasks visually-hidden" id="fabTasks"
                    title="Tasks & Challenges" type="button" tabindex="-1"
                    aria-hidden="true">
                    <i class="fas fa-clipboard-list"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content" id="mainContent"></main>

        <!-- Filter Bar (placed dynamically below section title) -->
        <div id="filterBar" class="filter-bar" style="display:none;"></div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav" aria-label="Main navigation">
            <div class="bottom-nav-side">
                <a href="#courses" class="nav-item active" data-page="courses">
                    <i class="fas fa-book-open"></i>
                    <span>Courses</span>
                </a>
                <a href="#exams" class="nav-item" data-page="exams">
                    <i class="fas fa-file-alt"></i>
                    <span>Exams</span>
                </a>
            </div>

            <button type="button" class="nav-contribute-fab" id="contributeNavBtn"
                data-page="contribute" title="Contribute" aria-label="Contribute">
                <i class="fas fa-plus"></i>
                <span class="notification-badge" id="contributeBadge"
                    style="display:none;">0</span>
            </button>

            <div class="bottom-nav-side">
                <a href="#books-outline" class="nav-item" data-page="books-outline">
                    <i class="fas fa-book"></i>
                    <span>Books</span>
                </a>
                <a href="#lecture-notes" class="nav-item" data-page="lecture-notes">
                    <i class="fas fa-graduation-cap"></i>
                    <span>Notes</span>
                </a>
            </div>
        </nav>

        <script src="js/config.js"></script>
        <script src="js/notification.js"></script>
        <script src="js/main.js"></script>
        <script src="js/courses.js"></script>
        <script src="js/exams.js"></script>
        <script src="js/books-outline.js"></script>
        <script src="js/lecture-notes.js"></script>
        <script src="js/contributors.js"></script>
        <script src="js/contribute.js"></script>
        <script src="js/tasks.js"></script>
        <script src="js/contact.js"></script>
    </body>
</html>
