<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BASH - Business Analytics Student Hub</title>
    <meta name="description" content="BASH Resource Hub is temporarily closed. See you next semester!">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0f1e;
            overflow: hidden;
        }

        /* Animated background blobs */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: drift 12s ease-in-out infinite alternate;
        }
        .blob-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #1a56db, #1e3a8a);
            top: -120px; left: -100px;
            animation-delay: 0s;
        }
        .blob-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #7c3aed, #4f46e5);
            bottom: -100px; right: -80px;
            animation-delay: -4s;
        }
        .blob-3 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, #0e7490, #164e63);
            top: 50%; left: 55%;
            animation-delay: -8s;
        }
        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(30px, 20px) scale(1.08); }
        }

        /* Card */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 24px;
            padding: 56px 48px;
            max-width: 520px;
            width: 90%;
            text-align: center;
            box-shadow:
                0 25px 60px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.08);
            animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(32px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Lock icon */
        .icon-wrap {
            width: 80px;
            height: 80px;
            margin: 0 auto 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1d4ed8, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.4);
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(99, 102, 241, 0.35); }
            50%       { box-shadow: 0 0 55px rgba(99, 102, 241, 0.65); }
        }
        .icon-wrap svg {
            width: 36px;
            height: 36px;
            fill: #fff;
        }

        /* Logo */
        .logo {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            margin-bottom: 12px;
        }

        /* Heading */
        h1 {
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: 700;
            color: #fff;
            line-height: 1.25;
            margin-bottom: 20px;
        }

        /* Divider */
        .divider {
            width: 48px;
            height: 3px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 999px;
            margin: 0 auto 24px;
        }

        /* Message */
        p {
            font-size: 1rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.60);
            line-height: 1.7;
            margin-bottom: 8px;
        }
        p.highlight {
            font-size: 1.05rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
        }

        /* Footer note */
        .footer-note {
            margin-top: 36px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.07);
            font-size: 0.78rem;
            color: rgba(255,255,255,0.25);
            letter-spacing: 0.02em;
        }
        .footer-note span {
            color: rgba(255,255,255,0.45);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- Background -->
    <div class="bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Closure Card -->
    <div class="card">

        <div class="icon-wrap">
            <!-- Lock icon -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M17 11V7C17 4.24 14.76 2 12 2S7 4.24 7 7v4H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1ZM9 7a3 3 0 0 1 6 0v4H9V7Zm4 8.73V18h-2v-2.27a2 2 0 1 1 2 0Z"/>
            </svg>
        </div>

        <p class="logo">BASH &mdash; Business Analytics Student Hub</p>

        <h1>Site Temporarily Closed</h1>

        <div class="divider"></div>

        <p class="highlight">Due to security issues, the site is currently closed.</p>
        <p>See you in the next semester &mdash; we will be back with improvements!</p>

        <div class="footer-note">
            For urgent queries contact &nbsp;<span>bash.official.pk@gmail.com</span>
        </div>

    </div>

</body>
</html>
